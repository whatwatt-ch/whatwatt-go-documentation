/api/v1/settings:
  get:
    tags:
    - Settings
    summary: Read current settings
    description: 'Reads the current configuration. Most settings apply dynamically without reboot.'
    operationId: getSettings
    responses:
      '200':
        description: Current settings
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Settings.yaml'
            examples:
              ok:
                value:
                  system:
                    name: ''
                    host_name: whatwatt_9F8124
                    protection: false
                    power_save: false
                    p1_wifi_boost: true
                    use_dhcp_ntp_server: true
                    custom_ntp_server: time.cloudflare.com
                    use_custom_ntp_server: false
                  services:
                    report_interval: 30
                    low_power_report: false
                    log: false
      '401':
        $ref: '../components/responses/Unauthorized.yaml'
      '500':
        $ref: '../components/responses/InternalError.yaml'
  put:
    tags:
    - Settings
    summary: Update settings (partial)
    description: 'Partially updates the configuration object. Values apply dynamically.'
    operationId: updateSettings
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Settings.yaml'
          examples:
            partial:
              value:
                system:
                  host_name: whatwatt_9F8124
                  use_dhcp_ntp_server: false
                  custom_ntp_server: time.cloudflare.com
                  use_custom_ntp_server: true
                services:
                  low_power_report: true
    responses:
      '200':
        description: Updated settings
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Settings.yaml'
            examples:
              ok:
                value:
                  system:
                    name: ''
                    host_name: whatwatt_9F8124
                    protection: false
                    power_save: false
                    p1_wifi_boost: true
                    use_dhcp_ntp_server: false
                    custom_ntp_server: time.cloudflare.com
                    use_custom_ntp_server: true
                  services:
                    report_interval: 30
                    low_power_report: true
                    log: false
      '400':
        $ref: '../components/responses/BadRequest.yaml'
      '401':
        $ref: '../components/responses/Unauthorized.yaml'
      '500':
        $ref: '../components/responses/InternalError.yaml'
  post:
    tags:
    - Settings
    summary: Replace settings (full)
    description: 'Replaces the entire configuration object. Values apply dynamically.'
    operationId: replaceSettings
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Settings.yaml'
          examples:
            full:
              value:
                system:
                  name: Plant A
                  host_name: whatwatt_9F8124
                  protection: false
                  power_save: false
                  p1_wifi_boost: true
                  use_dhcp_ntp_server: false
                  custom_ntp_server: pool.ntp.org
                  use_custom_ntp_server: true
                services:
                  report_interval: 30
                  low_power_report: true
                  log: true
    responses:
      '200':
        description: Replaced settings
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Settings.yaml'
            examples:
              ok:
                value:
                  system:
                    name: Plant A
                    host_name: whatwatt_9F8124
                    protection: false
                    power_save: false
                    p1_wifi_boost: true
                    use_dhcp_ntp_server: false
                    custom_ntp_server: pool.ntp.org
                    use_custom_ntp_server: true
                  services:
                    report_interval: 30
                    low_power_report: true
                    log: true
      '400':
        $ref: '../components/responses/BadRequest.yaml'
      '401':
        $ref: '../components/responses/Unauthorized.yaml'
      '500':
        $ref: '../components/responses/InternalError.yaml'
